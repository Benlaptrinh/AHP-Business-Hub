version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ahp_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ahp
      MYSQL_USER: ahp
      MYSQL_PASSWORD: ahp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

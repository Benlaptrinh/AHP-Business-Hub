name: Bug report
description: Report a reproducible defect in frontend or backend.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend
        - Backend
        - CI/CD
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the issue and impact.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Execute ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, browser, API environment
